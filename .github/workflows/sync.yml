name: Sync Rules

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/JieWSOFT/-.git
          git fetch upstream

      - name: Sync files
        run: |
          git checkout upstream/master -- category-rules
          git checkout upstream/master -- full_rules.yaml
          git checkout upstream/master -- naming-rules.yaml
          git checkout upstream/master -- quality-rules.yaml
          git checkout upstream/master -- tmdb_override

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "auto sync rules"

      - name: Push
        run: git push
